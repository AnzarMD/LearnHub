version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: learnhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: learnhub
      POSTGRES_PASSWORD: learnhub123
      POSTGRES_DB: learnhub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnhub -d learnhub_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: learnhub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnhub_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://learnhub:learnhub123@postgres:5432/learnhub_db?schema=public
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
